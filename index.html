<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Michael Szczepanski — Product Designer</title>
  <link rel="stylesheet" href="https://use.typekit.net/edy4igy.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #141414;
      --red: #d80000;
      --orange: #D4500A;
      --off-white: #E8E0D5;
    }

    html, body { height: 100%; overflow-x: hidden; }

    body {
      background: var(--black);
      color: var(--off-white);
      font-family: "space-grotesk-variable", sans-serif;
    }

    /* SCROLLSMOOTHER — wrapper is the viewport, content is what scrolls */
    #wrapper {
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
    }

    #content {
      overflow: visible;
      width: 100%;
    }

    /* SCROLL PROGRESS LINE + NAV live outside #content so position:fixed works correctly */
    .scroll-line {
      position: fixed;
      top: 0;
      right: 0;
      width: 2px;
      height: 100vh;
      background: var(--red);
      transform-origin: top center;
      transform: scaleY(0);
      z-index: 200;
      pointer-events: none;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 48px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }

    .nav-logo {
      display: block;
      text-decoration: none;
      line-height: 0;
    }

    .nav-hark {
      width: 24px;
      height: auto;
      opacity: 0;
    }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      font-family: "space-grotesk-variable", sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--off-white);
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .nav-links a:hover { opacity: 1; }

    /* HERO */
    .hero {
      height: 300vh;
      position: relative;
    }

    /* ScrollTrigger pin replaces position:sticky */
    .hero-visual {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      overflow: hidden;
      position: relative;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background: #000;
    }

    .hero-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.35;
    }

    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(67, 30, 10, 0.65);
    }

    .hero-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 34px;
      max-width: 1187px;
      width: 100%;
      padding: 0 48px;
    }

    .hero-logo {
      width: 57px;
      height: 70px;
      object-fit: contain;
    }

    .hero-headlines {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }

    .hero-headline {
      font-family: "roc-grotesk-wide", sans-serif;
      font-weight: 700;
      font-size: clamp(60px, 9.1vw, 138px);
      line-height: 0.85;
      text-transform: uppercase;
      color: var(--red);
    }

    /* SplitText creates these automatically */
    .hero-headline .word { display: inline-block; white-space: nowrap; }
    .hero-headline .char { display: inline-block; will-change: transform; }

    .hero-sub {
      font-family: "Inter", sans-serif;
      font-weight: 500;
      font-size: clamp(15px, 1.4vw, 21px);
      line-height: 1.36;
      letter-spacing: -0.02em;
      color: #fff;
      max-width: 740px;
    }

    .hero-byline {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 486px;
      font-family: "space-grotesk-variable", sans-serif;
      font-weight: 500;
      font-size: clamp(14px, 1.4vw, 21px);
      line-height: 1.36;
      letter-spacing: -0.02em;
      color: #fff;
    }

    /* WORK SECTION — data-speed parallax demo */
    .work-section {
      min-height: 100vh;
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 120px 48px;
    }

    .work-section h2 {
      font-family: "roc-grotesk-wide", sans-serif;
      font-weight: 700;
      font-size: clamp(32px, 5vw, 80px);
      color: var(--off-white);
      text-transform: uppercase;
      text-align: center;
      opacity: 0.08;
    }
  </style>
</head>
<body>

  <div id="wrapper">

    <!-- Fixed UI outside #content — ScrollSmoother applies transform to #content,
         which would break position:fixed children inside it -->
    <div class="scroll-line"></div>
    <nav>
      <a class="nav-logo" href="/">
        <img class="nav-hark" src="https://www.figma.com/api/mcp/asset/ce383d54-56b9-48f6-a1c0-0e0fc89d425f" alt="Hark" />
      </a>
      <ul class="nav-links">
        <li><a href="#work">Work</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>

    <div id="content">

      <section class="hero">
        <div class="hero-visual">
          <div class="hero-bg">
            <img src="https://www.figma.com/api/mcp/asset/46bcf49f-fd85-42dc-a9ae-4d1961ff9ce1" alt="" />
          </div>
          <div class="hero-container">
            <img class="hero-logo" src="https://www.figma.com/api/mcp/asset/ce383d54-56b9-48f6-a1c0-0e0fc89d425f" alt="Hark logo" />
            <div class="hero-headlines">
              <h1 class="hero-headline">I Make Software Easy to Use</h1>
              <p class="hero-sub">Honestly I make diagrams and interfaces that help people visualize their ideas, get others to see their vision, and produce the blueprints to build it.</p>
            </div>
          </div>
          <div class="hero-byline">
            <span>Michael Szczepanski</span>
            <span>Minneapolis, MN</span>
          </div>
        </div>
      </section>

      <!-- data-speed="0.85" makes this heading scroll at 85% speed — subtle parallax lag -->
      <section class="work-section" id="work">
        <h2 data-speed="0.85">Work coming soon</h2>
      </section>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollSmoother.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/SplitText.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger, ScrollSmoother, SplitText);

    // ScrollSmoother MUST be created first — it sets up the scroll proxy everything else uses
    const smoother = ScrollSmoother.create({
      wrapper: '#wrapper',
      content: '#content',
      smooth: 1.2,           // inertia amount (1 = normal, higher = more lag)
      effects: true,         // enables data-speed and data-lag attributes
      normalizeScroll: true, // consistent scroll across browsers/devices
      ignoreMobileResize: true,
    });

    // Pin .hero-visual for the full 300vh of .hero (replaces CSS position:sticky)
    ScrollTrigger.create({
      trigger: '.hero',
      start: 'top top',
      end: 'bottom bottom',
      pin: '.hero-visual',
      pinSpacing: false,
    });

    // SplitText handles the char splitting cleanly, including accessibility
    const split = new SplitText('.hero-headline', { type: 'chars,words' });
    const chars = split.chars;
    const mid = (chars.length - 1) / 2;

    // Per-letter lag — each char has progressively more inertia
    // Creates an organic wave as letters disperse rather than moving in lockstep
    chars.forEach((char, i) => {
      smoother.effects(char, { lag: (i / chars.length) * 0.15 });
    });

    // Master timeline scrubbed to the full 300vh hero scroll
    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: '.hero',
        start: 'top top',
        end: 'bottom bottom',
        scrub: 1,
      }
    });

    // 0–15%: subtext + byline fade out
    tl.to(['.hero-sub', '.hero-byline'], {
      opacity: 0, y: -20, ease: 'none', duration: 0.15,
    }, 0);

    // 0–12%: hero logo fades up and out
    tl.to('.hero-logo', {
      opacity: 0, y: -50, ease: 'none', duration: 0.12,
    }, 0);

    // 10–22%: nav hark mark fades in
    tl.to('.nav-hark', {
      opacity: 1, ease: 'none', duration: 0.12,
    }, 0.1);

    // 8–88%: dandelion seed dispersion — each letter drifts up, out, and rotates
    chars.forEach((char, i) => {
      const offset = i - mid;
      const dir = offset < 0 ? -1 : 1;
      const mag = Math.abs(offset);
      const spread = window.innerWidth / chars.length * 2.5;
      const staggerStart = 0.08 + (i / chars.length) * 0.08;

      tl.to(char, {
        x: dir * mag * spread,
        y: -(window.innerHeight * 0.7 + mag * 15),
        rotation: offset * 7,
        scale: 1 + mag * 0.08,
        opacity: 0,
        ease: 'power1.in',
        duration: 0.75,
      }, staggerStart);
    });

    // Scroll progress line
    gsap.to('.scroll-line', {
      scaleY: 1,
      ease: 'none',
      scrollTrigger: {
        start: 0,
        end: 'max',
        scrub: 0,
      }
    });
  </script>

</body>
</html>
