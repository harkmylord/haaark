<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Michael Szczepanski — Product Designer</title>
  <link rel="stylesheet" href="https://use.typekit.net/edy4igy.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #141414;
      --red: #d80000;
      --orange: #D4500A;
      --off-white: #E8E0D5;
    }

    body {
      background: var(--black);
      color: var(--off-white);
      font-family: "space-grotesk-variable", sans-serif;
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 48px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      mix-blend-mode: normal;
    }

    .nav-logo {
      font-family: "space-grotesk-variable", sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--off-white);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      font-family: "space-grotesk-variable", sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--off-white);
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .nav-links a:hover { opacity: 1; }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .hero-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.35;
    }

    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(67, 30, 10, 0.65);
    }

    .hero-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 34px;
      max-width: 1187px;
      width: 100%;
      padding: 0 48px;
    }

    .hero-logo {
      width: 57px;
      height: 70px;
      object-fit: contain;
    }

    .hero-headlines {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }

    .hero-headline {
      font-family: "roc-grotesk-wide", sans-serif;
      font-weight: 700;
      font-size: clamp(60px, 9.1vw, 138px);
      line-height: 0.85;
      text-transform: uppercase;
      color: var(--red);
    }

    .hero-sub {
      font-family: "Inter", sans-serif;
      font-weight: 500;
      font-size: clamp(15px, 1.4vw, 21px);
      line-height: 1.36;
      letter-spacing: -0.02em;
      color: #fff;
      max-width: 740px;
    }

    .hero-byline {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 486px;
      font-family: "space-grotesk-variable", sans-serif;
      font-weight: 500;
      font-size: clamp(14px, 1.4vw, 21px);
      line-height: 1.36;
      letter-spacing: -0.02em;
      color: #fff;
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="/">MS</a>
    <ul class="nav-links">
      <li><a href="#work">Work</a></li>
      <li><a href="#about">About</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <section class="hero">
    <div class="hero-bg">
      <img src="https://www.figma.com/api/mcp/asset/46bcf49f-fd85-42dc-a9ae-4d1961ff9ce1" alt="" />
    </div>
    <div class="hero-container">
      <img class="hero-logo" src="https://www.figma.com/api/mcp/asset/ce383d54-56b9-48f6-a1c0-0e0fc89d425f" alt="Hark logo" />
      <div class="hero-headlines">
        <h1 class="hero-headline">I Make Software Easy to Use</h1>
        <p class="hero-sub">Honestly I make diagrams and interfaces that help people visualize their ideas, get others to see their vision, and produce the blueprints to build it.</p>
      </div>
    </div>
    <div class="hero-byline">
      <span>Michael Szczepanski</span>
      <span>Minneapolis, MN</span>
    </div>
  </section>

</body>
</html>
